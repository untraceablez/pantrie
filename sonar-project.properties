# SonarQube analysis configuration for Pantrie.
# Override sonar.host.url / sonar.token via Jenkins (withSonarQubeEnv) or CLI.

sonar.projectKey=pantrie
sonar.projectName=Pantrie
sonar.sourceEncoding=UTF-8

# Backend (Python) sources.
#
# NOTE: frontend (TS/React) is temporarily NOT analyzed by Sonar. SonarQube's
# JS/TS analyzer needs a glibc Node 20+, but the sonarsource/sonar-scanner-cli
# image is Alpine/musl with Node 18, so the analyzer's bridge fails to start.
# Re-enable the frontend once the Sonar stage runs in a Node-20/glibc context
# (e.g. `npx @sonar/scan` in the node:20 container, with JRE auto-provisioning),
# by restoring: frontend/src in sonar.sources, the test.inclusions line, and the
# javascript/typescript lcov reportPaths below.
sonar.sources=backend/src

# Tests
sonar.tests=backend/tests

# Coverage reports (produced by the test stages)
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml
# Frontend coverage (lcov) is still generated by the pipeline; wire it back in
# with the frontend analysis re-enable above:
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
# sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclude generated / vendored / non-source paths from analysis and coverage
sonar.exclusions=backend/alembic/**,**/__pycache__/**,**/node_modules/**
sonar.coverage.exclusions=backend/tests/**
